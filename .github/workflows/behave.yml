name: CI Pipeline

on:
  pull_request:
    branches: [ main, master ]

jobs:
  behave-tests:
    runs-on: ubuntu-latest

    env:
      HEADLESS: true
      PARABANK_URL: https://parabank.parasoft.com/parabank
      DEFAULT_TIMEOUT: 15
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium chromium-driver
          if [ -x /usr/bin/chromedriver ]; then echo "CHROMEDRIVER_PATH=/usr/bin/chromedriver" >> "$GITHUB_ENV"; fi
          if [ -x /usr/lib/chromium/chromedriver ]; then echo "CHROMEDRIVER_PATH=/usr/lib/chromium/chromedriver" >> "$GITHUB_ENV"; fi
          which chromium || echo "chromium not found"
          which chromedriver || echo "chromedriver not found"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install behave selenium

      - name: Run Behave tests
        id: behave
        continue-on-error: true
        run: |
          mkdir -p reports
          python -m behave --format plain --out reports/behave-ci.txt

      - name: Summarize test results
        if: always()
        run: |
          echo "## Behave test summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/behave-ci.txt ]; then
            echo "### Execution log" >> "$GITHUB_STEP_SUMMARY"
            tail -n 20 reports/behave-ci.txt >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f reports/behave-ci.txt ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Result" >> "$GITHUB_STEP_SUMMARY"
