name: Behave Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  behave:
    runs-on: ubuntu-latest

    env:
      HEADLESS: true
      PARABANK_URL: https://parabank.parasoft.com/parabank
      DEFAULT_TIMEOUT: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          (sudo apt-get install -y chromium-browser chromium-driver || sudo apt-get install -y chromium chromium-driver)
          if [ -x /usr/bin/chromedriver ]; then echo "CHROMEDRIVER_PATH=/usr/bin/chromedriver" >> "$GITHUB_ENV"; fi
          if [ -x /usr/lib/chromium-browser/chromedriver ]; then echo "CHROMEDRIVER_PATH=/usr/lib/chromium-browser/chromedriver" >> "$GITHUB_ENV"; fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Behave tests
        id: behave
        continue-on-error: true
        run: |
          mkdir -p reports
          python -m behave --format plain --out reports/behave-ci.txt

      - name: Summarize test results
        if: always()
        run: |
          echo "## Behave test summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/behave-ci.txt ]; then
            echo "### Execution log" >> "$GITHUB_STEP_SUMMARY"
            tail -n 20 reports/behave-ci.txt >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f reports/behave-ci.txt ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Result" >> "$GITHUB_STEP_SUMMARY"
            grep -E "(features passed|scenarios passed|steps passed|failed|error|skipped)" reports/behave-ci.txt | tail -n 10 >> "$GITHUB_STEP_SUMMARY" || true
          fi
          if [ "${{ steps.behave.outcome }}" = "success" ]; then
            echo "✅ Behave completed successfully." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Behave completed with failures or errors." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behave-reports
          path: reports/
